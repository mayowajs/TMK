<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TMK Fashion — Women's Collection | Dresses, Tops, Shoes & Accessories</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='15' fill='%231e1c1a'/><text y='.85em' x='10' font-size='65' font-weight='bold' font-family='serif' fill='%23c9b28b'>T</text></svg>">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    /* ===== ORIGINAL CSS (unchanged) ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --chalk-white: #f7f5f0;
      --pure-ivory: #fefaf5;
      --charcoal-soft: #1e1c1a;
      --slate-mist: #2c2a28;
      --taupe-dust: #8e7c6f;
      --gold-whisper: #c9b28b;
      --pearl-glow: #e2dcd3;
      --soft-black: #12100e;
      --fade-grey: #d9d2c5;
      --blush-rose: #f5e6e8;
      --rose-dust: #e8cfd4;
      --rose-deep: #d4b5c0;
      --pink-gold: #e6c5c0;
    }

    body {
      background-color: var(--chalk-white);
      color: var(--charcoal-soft);
      font-family: 'Inter', sans-serif;
      line-height: 1.5;
      overflow-x: hidden;
    }

    h1,
    h2,
    h3,
    .nav-left span,
    .footer-logo {
      font-family: 'Playfair Display', serif;
    }

    .nav {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 1.5rem 5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(247, 245, 240, 0.96);
      backdrop-filter: blur(12px);
      z-index: 1000;
      border-bottom: 1px solid rgba(30, 28, 26, 0.08);
    }

    .nav-left span {
      font-size: 1.6rem;
      font-weight: 500;
      letter-spacing: 3px;
      color: var(--charcoal-soft);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .search-input {
      padding: 0.5rem 1rem;
      border: 1px solid rgba(30, 28, 26, 0.2);
      border-radius: 20px;
      background: rgba(247, 245, 240, 0.9);
      color: var(--charcoal-soft);
      font-size: 0.85rem;
      width: 200px;
      transition: 0.2s;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--gold-whisper);
      background: white;
    }

    .nav-right a {
      text-decoration: none;
      font-weight: 500;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--slate-mist);
      transition: 0.2s;
    }

    .user-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--taupe-dust);
      padding: 0 0.75rem;
      white-space: nowrap;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .nav-right a:hover,
    .nav-right a.active {
      color: var(--taupe-dust);
    }

    .cart-icon {
      position: relative;
      cursor: pointer;
      font-size: 1.3rem;
      color: var(--charcoal-soft);
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
    }

    .cart-icon:hover {
      color: var(--taupe-dust);
    }

    .cart-count {
      position: absolute;
      top: -10px;
      right: -12px;
      background: var(--gold-whisper);
      color: var(--charcoal-soft);
      font-size: 0.7rem;
      font-weight: 600;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
    }

    .cart-sidebar {
      position: fixed;
      top: 0;
      right: -400px;
      width: 400px;
      height: 100vh;
      background: white;
      box-shadow: -5px 0 30px rgba(0, 0, 0, 0.1);
      z-index: 2000;
      transition: right 0.3s ease;
      display: flex;
      flex-direction: column;
      font-family: 'Inter', sans-serif;
    }

    .cart-sidebar.open {
      right: 0;
    }

    .cart-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--fade-grey);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart-header h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
    }

    .close-cart {
      cursor: pointer;
      font-size: 1.2rem;
      color: var(--taupe-dust);
    }

    .cart-items {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
    }

    .cart-item {
      display: flex;
      gap: 1rem;
      padding: 1rem;
      border-bottom: 1px solid var(--fade-grey);
      margin-bottom: 0.5rem;
    }

    .cart-item-image {
      width: 80px;
      height: 80px;
      object-fit: cover;
      background: var(--pearl-glow);
    }

    .cart-item-details {
      flex: 1;
    }

    .cart-item-title {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 0.3rem;
    }

    .cart-item-price {
      color: var(--taupe-dust);
      font-size: 0.85rem;
    }

    .cart-item-quantity {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .cart-item-quantity button {
      width: 25px;
      height: 25px;
      border: 1px solid var(--fade-grey);
      background: white;
      cursor: pointer;
      border-radius: 4px;
    }

    .cart-item-quantity span {
      font-size: 0.85rem;
    }

    .remove-item {
      color: var(--taupe-dust);
      cursor: pointer;
      font-size: 0.75rem;
      margin-top: 0.3rem;
      display: inline-block;
    }

    .cart-footer {
      padding: 1.5rem;
      border-top: 1px solid var(--fade-grey);
    }

    .cart-total {
      display: flex;
      justify-content: space-between;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .checkout-btn {
      width: 100%;
      padding: 1rem;
      background: var(--charcoal-soft);
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-size: 0.8rem;
    }

    .empty-cart {
      text-align: center;
      padding: 2rem;
      color: var(--taupe-dust);
    }

    .cart-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1999;
      display: none;
    }

    .cart-overlay.open {
      display: block;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--charcoal-soft);
      color: white;
      padding: 0.8rem 1.5rem;
      border-radius: 8px;
      font-size: 0.85rem;
      z-index: 3000;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .collection-hero {
      background: linear-gradient(135deg, #f8e7ec 0%, #e8cfd4 50%, #d9b8c2 100%);
      padding: 10rem 5rem 6rem 5rem;
      text-align: center;
      position: relative;
      margin-top: 80px;
    }

    .collection-hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.08) 0px, rgba(255, 255, 255, 0.08) 2px, transparent 2px, transparent 8px);
      pointer-events: none;
    }

    .hero-title {
      font-size: 4rem;
      font-weight: 600;
      letter-spacing: 6px;
      color: var(--charcoal-soft);
      margin-bottom: 1rem;
      text-transform: uppercase;
    }

    .hero-subtitle {
      font-size: 1rem;
      color: #6b4e5a;
      letter-spacing: 2px;
      margin-bottom: 1.5rem;
    }

    .hero-line {
      width: 100px;
      height: 3px;
      background: #b27d8a;
      margin: 0 auto;
    }

    .fashion-section {
      padding: 5rem 5rem 3rem 5rem;
      background: var(--chalk-white);
    }

    .section-header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .section-title {
      font-size: 2.5rem;
      font-weight: 500;
      letter-spacing: 4px;
      color: var(--charcoal-soft);
      margin-bottom: 0.5rem;
    }

    .title-line {
      width: 60px;
      height: 2px;
      background: var(--gold-whisper);
      margin: 0.5rem auto;
    }

    .section-subtitle {
      font-size: 0.85rem;
      color: var(--taupe-dust);
      letter-spacing: 1px;
      margin-top: 0.5rem;
    }

    .fashion-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .product-card {
      background: white;
      border: 1px solid var(--fade-grey);
      transition: 0.3s;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 30px -12px rgba(0, 0, 0, 0.1);
      border-color: var(--gold-whisper);
    }

    .product-image {
      width: 100%;
      height: 380px;
      background: var(--pearl-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: 0.4s;
    }

    .product-card:hover .product-image img {
      transform: scale(1.02);
    }

    .product-info {
      padding: 1.5rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .product-info h3 {
      font-size: 1.2rem;
      font-weight: 600;
      font-family: 'Playfair Display', serif;
      color: var(--charcoal-soft);
      margin-bottom: 0.3rem;
      letter-spacing: 1px;
    }

    .product-category {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--taupe-dust);
      margin-bottom: 0.8rem;
    }

    .product-description {
      font-size: 0.85rem;
      color: #6b6258;
      margin-bottom: 1rem;
      line-height: 1.5;
    }

    .product-details {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.2rem;
      padding-top: 0.5rem;
      border-top: 1px solid var(--fade-grey);
    }

    .product-price {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--taupe-dust);
    }

    .product-color {
      font-size: 0.75rem;
      color: #9a8b7a;
      letter-spacing: 1px;
    }

    .cart-icon-btn {
      display: inline-block;
      width: 150px;
      padding: 0.7rem 0.5rem;
      background: transparent;
      border: none;
      color: var(--charcoal-soft);
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: 0.3s;
      text-align: center;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      margin-bottom: 0.8rem;
      border-radius: 5px;
    }

    .cart-icon-btn:hover {
      background: var(--charcoal-soft);
      color: white;
      border-radius: 15px;
    }

    .shop-btn {
      display: inline-block;
      padding: 0.7rem 1.5rem;
      background: transparent;
      border: 1px solid var(--charcoal-soft);
      color: var(--charcoal-soft);
      text-decoration: none;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: 0.3s;
      text-align: center;
      margin-top: auto;
    }

    .shop-btn:hover {
      background: var(--charcoal-soft);
      color: white;
    }

    .footer {
      background: var(--charcoal-soft);
      color: #dbd1c4;
      padding: 3rem 5rem 2.5rem;
      text-align: center;
      margin-top: 2rem;
    }

    .footer-logo {
      font-size: 1.4rem;
      font-weight: 400;
      letter-spacing: 4px;
      margin-bottom: 1.5rem;
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 2rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .footer-links a {
      color: #bfb29f;
      text-decoration: none;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      transition: 0.2s;
    }

    .footer-links a:hover {
      color: var(--gold-whisper);
    }

    .footer-line {
      width: 150px;
      height: 1px;
      background: #5e554b;
      margin: 1rem auto;
    }

    .footer p {
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: #b9ab98;
    }

    @media (max-width: 768px) {
      .nav {
        padding: 1rem 1.5rem;
      }

      .nav-left span {
        font-size: 1.2rem;
      }

      .nav-right a {
        margin-left: 1.2rem;
        font-size: 0.7rem;
      }

      .cart-sidebar {
        width: 100%;
        right: -100%;
      }

      .collection-hero {
        padding: 8rem 2rem 4rem 2rem;
        margin-top: 70px;
      }

      .hero-title {
        font-size: 2.5rem;
      }

      .fashion-section {
        padding: 3rem 1.5rem;
      }

      .section-title {
        font-size: 1.8rem;
      }

      .fashion-grid {
        grid-template-columns: 1fr;
      }

      .product-image {
        height: 300px;
      }

      .footer {
        padding: 2rem 1.5rem;
      }

      .footer-links {
        gap: 1rem;
        flex-direction: column;
        align-items: center;
      }
    }

    @media (max-width: 480px) {
      .hero-title {
        font-size: 2rem;
      }

      .section-title {
        font-size: 1.5rem;
      }

      .product-info h3 {
        font-size: 1rem;
      }
    }

    /* ===== CRAZY SINGLE PRODUCT PAGE STYLES (same color theme, wild details) ===== */
    .single-product-page {
      max-width: 1400px;
      margin: 140px auto 60px;
      background: linear-gradient(145deg, var(--chalk-white) 0%, #fff6f0 100%);
      border-radius: 48px 48px 32px 32px;
      box-shadow: 0 35px 70px -20px rgba(0, 0, 0, 0.25);
      overflow: hidden;
      position: relative;
      animation: pageGlow 0.6s ease-out;
    }

    @keyframes pageGlow {
      0% {
        opacity: 0;
        transform: scale(0.97) translateY(20px);
        filter: blur(4px);
      }

      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
        filter: blur(0);
      }
    }

    .single-product-page::before {
      content: "◊◊◊";
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 5rem;
      font-weight: 100;
      color: var(--gold-whisper);
      opacity: 0.15;
      font-family: 'Playfair Display', serif;
      pointer-events: none;
      letter-spacing: 12px;
    }

    .single-product-page::after {
      content: "✨ CRAZY EDITION ✨";
      position: absolute;
      bottom: 30px;
      left: -40px;
      transform: rotate(-90deg);
      font-size: 0.8rem;
      letter-spacing: 6px;
      background: var(--rose-dust);
      color: var(--charcoal-soft);
      padding: 6px 18px;
      border-radius: 60px;
      font-weight: bold;
      opacity: 0.7;
      white-space: nowrap;
    }

    .product-detail-layout {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 0;
      background: var(--chalk-white);
    }

    .detail-image-area {
      background: radial-gradient(circle at 30% 20%, #f3eae4, #e0cfc5);
      padding: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      border-right: 2px dashed var(--gold-whisper);
    }

    .detail-image-area img {
      width: 100%;
      max-height: 550px;
      object-fit: cover;
      border-radius: 32px;
      box-shadow: 25px 25px 50px rgba(0, 0, 0, 0.2), -5px -5px 15px rgba(255, 255, 240, 0.6);
      transition: all 0.4s;
      transform: rotate(1deg);
    }

    .detail-image-area:hover img {
      transform: rotate(0deg) scale(1.02);
    }

    .detail-info-area {
      padding: 3rem 3.5rem;
      background: rgba(247, 245, 240, 0.8);
      backdrop-filter: blur(2px);
      position: relative;
    }

    .detail-brand {
      font-size: 0.75rem;
      letter-spacing: 5px;
      color: var(--taupe-dust);
      text-transform: uppercase;
      border-left: 4px solid var(--gold-whisper);
      padding-left: 12px;
      margin-bottom: 1.2rem;
    }

    .detail-title {
      font-size: 3rem;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
      color: var(--charcoal-soft);
      letter-spacing: -0.5px;
      margin-bottom: 0.8rem;
      line-height: 1.2;
      background: linear-gradient(135deg, #1e1c1a 0%, #5e4b3e 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .detail-category {
      display: inline-block;
      background: var(--rose-dust);
      padding: 0.2rem 1rem;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 1.2rem;
    }

    .detail-price {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--taupe-dust);
      margin: 1rem 0;
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
    }

    .detail-price span {
      font-size: 1rem;
      font-weight: 400;
      color: #aa9b8a;
    }

    .crazy-badge {
      background: repeating-linear-gradient(45deg, var(--gold-whisper) 0px, var(--gold-whisper) 5px, #f3e0c2 5px, #f3e0c2 10px);
      padding: 0.5rem 1rem;
      border-radius: 60px;
      font-size: 0.7rem;
      font-weight: bold;
      text-transform: uppercase;
      display: inline-block;
      margin: 1rem 0;
    }

    .detail-description {
      font-size: 1rem;
      line-height: 1.6;
      color: #4e443c;
      margin: 1.5rem 0;
      border-left: 3px solid var(--pink-gold);
      padding-left: 1rem;
      font-style: italic;
    }

    .detail-colors {
      display: flex;
      gap: 0.8rem;
      margin: 1.2rem 0;
      align-items: center;
    }

    .color-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid white;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      cursor: default;
    }

    .add-to-cart-big {
      background: var(--charcoal-soft);
      border: none;
      color: white;
      padding: 1rem 2rem;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 60px;
      margin-top: 1rem;
      transition: 0.2s;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .add-to-cart-big:hover {
      background: #3e3530;
      transform: scale(1.02);
      letter-spacing: 6px;
    }

    .back-to-collection {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: 1px solid var(--taupe-dust);
      color: var(--taupe-dust);
      padding: 0.6rem 1.5rem;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
      text-decoration: none;
      margin-top: 1.8rem;
      transition: 0.2s;
    }

    .back-to-collection:hover {
      background: var(--taupe-dust);
      color: white;
      border-color: var(--taupe-dust);
    }

    @media (max-width: 900px) {
      .product-detail-layout {
        grid-template-columns: 1fr;
      }

      .detail-image-area {
        border-right: none;
        border-bottom: 2px dashed var(--gold-whisper);
      }

      .single-product-page {
        margin: 110px 1rem 40px;
      }

      .detail-title {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>

  <header class="nav">
    <div class="nav-left">
      <span>◊ TMK FASHION</span>
    </div>
    <div class="nav-right">
      <a href="./images/index.html">HOME</a>
      <a href="collections.html" class="active">COLLECTION</a>
      <a href="#">RUNWAY</a>
      <a href="#">EDITORIAL</a>
      <a href="#">MAISON</a>
      <input type="text" id="searchInput" class="search-input" placeholder="Search products...">
      <a href="./signinn.html" id="loginLink">LOGIN</a>
      <span class="user-label" id="userLabel"></span>
      <div class="cart-icon" id="cartIcon">
        <i class="fas fa-shopping-bag"></i>
        <span class="cart-count" id="cartCount">0</span>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:0.75rem;">

    function renderSearchResults(filteredProducts) {
      if (filteredProducts.length === 0) {
        const html = `
        <main class="collection-page">
          <section class="collection-hero">
            <h1 class="hero-title">SEARCH RESULTS</h1>
            <p class="hero-subtitle">No products found</p>
            <div class="hero-line"></div>
          </section>
        </main>`;
        document.getElementById("app-root").innerHTML = html;
        return;
      }

      // Group products by category
      const grouped = filteredProducts.reduce((acc, product) => {
        if (!acc[product.category]) {
          acc[product.category] = [];
        }
        acc[product.category].push(product);
        return acc;
      }, {});

      let html = `
      <main class="collection-page">
        <section class="collection-hero">
          <h1 class="hero-title">SEARCH RESULTS</h1>
          <p class="hero-subtitle">
            ${filteredProducts.length} product${filteredProducts.length !== 1 ? 's' : ''} found
          </p>
          <div class="hero-line"></div>
        </section>`;

      // Build sections for each category with products
      Object.keys(grouped).forEach(category => {
        const products = grouped[category];
        html += buildSectionHtml(category, products);
      });

      html += `</main>`;

      document.getElementById("app-root").innerHTML = html;
      attachOriginalEventListeners();
    }

      const bigBtn = document.getElementById("bigAddCartBtn");

      const backBtn = document.getElementById("backToCollectionBtn");

    window.addToCartExternal = async function (product) {
         if (!currentUser) {
        showToast("Please sign in to add items to cart", "error");
        setTimeout(() => {
            window.location.href = "./signinn.html";
        }, 2000);
        return false;
    }
      const cartItem = {
        productId: product.name.replace(/\s/g, "_").toLowerCase(),
        name: product.name,
        price: product.price,
        category: product.category,
        image: product.image,
        quantity: 1,
        addedAt: new Date().toISOString()
      };

      if (!currentUser) {
        addToLocalCart(product);
        showToast(
          `${product.name} added to cart (saved locally)`,
          "info"
        );
        return;
      }

      try {
        const cartRef = doc(db, "carts", currentUser.uid);
        const cartSnap = await getDoc(cartRef);
        let items = [];

        if (cartSnap.exists()) {
          items = cartSnap.data().items || [];
          const existing = items.find(
            (item) => item.productId === cartItem.productId
          );

          if (existing) {
            existing.quantity += 1;
          } else {
            items.push(cartItem);
          }

          await updateDoc(cartRef, {
            items,
            lastUpdated: new Date().toISOString()
          });
        } else {
          await setDoc(cartRef, {
            userId: currentUser.uid,
            email: currentUser.email,
            items: [cartItem],
            createdAt: new Date().toISOString(),
            lastUpdated: new Date().toISOString()
          });
        }

        showToast(`${product.name} added to cart!`);
        await loadCart();
      } catch (error) {
        addToLocalCart(product);
        showToast(`${product.name} added locally`);
      }
    };

    function attachOriginalEventListeners() {
      document.querySelectorAll('.shop-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          const prodDataAttr = btn.getAttribute('data-view-details');
          if (prodDataAttr) {
            const product = JSON.parse(prodDataAttr);
            renderSingleProduct(product);
          }
        });
      });
      document.querySelectorAll('.cart-icon-btn').forEach(button => {
        button.addEventListener('click', async (e) => {
          e.preventDefault();
          const productData = JSON.parse(button.getAttribute('data-product'));
          await window.addToCartExternal(productData);
        });
      });
    }

    function updateAuthUI(user) {
      const loginLink = document.getElementById('loginLink');
      const userLabel = document.getElementById('userLabel');

      if (!loginLink || !userLabel) return;

      if (user) {
        loginLink.textContent = 'LOGOUT';
        loginLink.href = '#';
        userLabel.textContent = user.email || user.displayName || 'Signed in';
      } else {
        loginLink.textContent = 'LOGIN';
        loginLink.href = './signinn.html';
        userLabel.textContent = '';
        clearCartState();
      }
    }

    function addToLocalCart(product) {
        if (!currentUser) {
        showToast("Please sign in to add items to cart", "error");
        return false;
    }
      const cart = JSON.parse(
        localStorage.getItem('tmk_cart') || '{"items":[]}'
      );

      const pid = product.name.replace(/\s/g, '_').toLowerCase();
      const existing = cart.items.find(
        (item) => item.productId === pid
      );

      if (existing) {
        existing.quantity += 1;
      } else {
        cart.items.push({
          productId: pid,
          name: product.name,
          price: product.price,
          category: product.category,
          image: product.image,
          quantity: 1
        });
      }

      localStorage.setItem('tmk_cart', JSON.stringify(cart));
      updateCartUI(cart);
    }

    async function clearCartState(remoteUid) {
      localStorage.removeItem('tmk_cart');
      localStorage.setItem('tmk_cart_cleared', '1');
      updateCartUI({ items: [] });

      const cartCountElement = document.getElementById('cartCount');
      if (cartCountElement) cartCountElement.innerText = '0';

      if (!remoteUid) return;

      try {
        await setDoc(
          doc(db, 'carts', remoteUid),
          {
            items: [],
            lastUpdated: new Date().toISOString()
          }
        );
      } catch (error) {

      }
    }

    async function loadCart() {
      if (!currentUser) {
        if (localStorage.getItem('tmk_cart_cleared')) {
          localStorage.removeItem('tmk_cart');
          localStorage.removeItem('tmk_cart_cleared');
          updateCartUI({ items: [] });
          return;
        }

        const localCart = JSON.parse(
          localStorage.getItem('tmk_cart') || '{"items":[]}'
        );
        updateCartUI(localCart);
        return;
      }

      try {
        const cartSnap = await getDoc(
          doc(db, 'carts', currentUser.uid)
        );

        if (cartSnap.exists()) {
          updateCartUI(cartSnap.data());
        } else {
          updateCartUI({ items: [] });
        }
      } catch (error) {
        updateCartUI({ items: [] });
      }
    }
    function updateCartUI(cartData) {
      const items = cartData.items || [];
      const totalItems = items.reduce(
        (sum, item) => sum + (item.quantity || 1),
        0
      );

      document.getElementById('cartCount').innerText = totalItems;
      const container = document.getElementById('cartItems');
      const footer = document.getElementById('cartFooter');

      if (items.length === 0) {
        container.innerHTML =
          '<div class="empty-cart">Your bag is empty</div>';
        footer.style.display = 'none';
        return;
      }

      footer.style.display = 'block';

      document.getElementById('cartTotal').innerText = `$${items.reduce(
        (sum, item) => sum + (item.price || 0) * (item.quantity || 1),
        0
      )}`;

      container.innerHTML = items
        .map((item) => {
          return `
          <div class="cart-item">
            <img
              class="cart-item-image"
              src="${item.image}"
              onerror="this.src='https://via.placeholder.com/80'"
            >
            <div class="cart-item-details">
              <div class="cart-item-title">${item.name}</div>
              <div class="cart-item-price">$${item.price}</div>
              <div class="cart-item-quantity">
                <button onclick="window.updateQuantityGlobal('${item.productId}', -1)">-</button>
                <span>${item.quantity || 1}</span>
                <button onclick="window.updateQuantityGlobal('${item.productId}', 1)">+</button>
              </div>
              <div class="remove-item" onclick="window.removeFromCartGlobal('${item.productId}')">
                Remove
              </div>
            </div>
          </div>`;
        })
        .join('');
    }
    window.updateQuantityGlobal = async function (productId, change) {
      if (!currentUser) {
        const cart = JSON.parse(
          localStorage.getItem('tmk_cart') || '{"items":[]}'
        );
        const index = cart.items.findIndex(
          (item) => item.productId === productId
        );

        if (index === -1) return;

        cart.items[index].quantity += change;

        if (cart.items[index].quantity <= 0) {
          cart.items.splice(index, 1);
        }

        localStorage.setItem('tmk_cart', JSON.stringify(cart));
        updateCartUI(cart);
        return;
      }

      try {
        const cartRef = doc(db, 'carts', currentUser.uid);
        const snap = await getDoc(cartRef);

        if (!snap.exists()) return;

        const items = snap.data().items || [];
        const index = items.findIndex(
          (item) => item.productId === productId
        );
        if (index === -1) return;

        items[index].quantity += change;
        if (items[index].quantity <= 0) {
          items.splice(index, 1);
        }

        await updateDoc(cartRef, {
          items,
          lastUpdated: new Date().toISOString()
        });

        await loadCart();
      } catch (error) {

      }
    };
    window.removeFromCartGlobal = async function (productId) {
      if (!currentUser) {
        const cart = JSON.parse(
          localStorage.getItem('tmk_cart') || '{"items":[]}'
        );
        cart.items = cart.items.filter(
          (item) => item.productId !== productId
        );
        localStorage.setItem('tmk_cart', JSON.stringify(cart));
        updateCartUI(cart);
        return;
      }

      try {
        const cartRef = doc(db, 'carts', currentUser.uid);
        const snap = await getDoc(cartRef);

        if (!snap.exists()) return;

        const items = snap.data().items || [];
        await updateDoc(cartRef, {
          items: items.filter((item) => item.productId !== productId),
          lastUpdated: new Date().toISOString()
        });
        await loadCart();
      } catch (error) {
        // ignore error
      }
    };
    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;

      if (type === 'error') {
        toast.style.background = '#c77d6f';
      } else if (type === 'info') {
        toast.style.background = '#8e7c6f';
      } else {
        toast.style.background = '#1e1c1a';
      }

      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2500);
    }

    function attachCartGlobals() {
      const cartIcon = document.getElementById('cartIcon');
      const closeCart = document.getElementById('closeCart');
      const cartSidebar = document.getElementById('cartSidebar');
      const cartOverlay = document.getElementById('cartOverlay');
      const checkoutBtn = document.getElementById('checkoutBtn');
      const loginLink = document.getElementById('loginLink');

      cartIcon?.addEventListener('click', () => {
        cartSidebar.classList.add('open');
      });

      closeCart?.addEventListener('click', () => {
        cartSidebar.classList.remove('open');
      });

      cartOverlay?.addEventListener('click', () => {
        cartSidebar.classList.remove('open');
      });

      checkoutBtn?.addEventListener('click', async () => {
        if (!currentUser) {
          showToast('Please sign in to checkout');
          setTimeout(() => { window.location.href = './signinn.html'; }, 2000);
          return;
        }
        try {
          const cartSnap = await getDoc(doc(db, 'carts', currentUser.uid));
          const items = cartSnap.exists() ? (cartSnap.data().items || []) : [];
          if (!items.length) {
            showToast('Your cart is empty. Add items first.', 'error');
            return;
          }
          localStorage.setItem('tmk_cart', JSON.stringify({ items }));
          window.location.href = 'checkout.html';
        } catch (error) {
          showToast('Could not load cart. Try again.', 'error');
        }
      });

      loginLink?.addEventListener('click', async (event) => {
        if (!currentUser) return;
        event.preventDefault();
        const signedOutUid = currentUser.uid;
        currentUser = null;
        updateAuthUI(null);
        await clearCartState(signedOutUid);
        try {
          await signOut(auth);
          showToast('Signed out successfully', 'info');
        } catch (error) {
          showToast('Sign out failed', 'error');
        }
      });
    }

    let initialized = false;
    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      updateAuthUI(user);
      if (!initialized) {
        initialized = true;
        renderOriginalCollection();
        attachCartGlobals();
        document.getElementById('searchInput').addEventListener('input', handleSearch);
      }
      await loadCart();
    });
  </script>
</body>

</html>
